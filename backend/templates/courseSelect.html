<!doctype html>

<html>
  <body>
    <h1>FreekGolf!!!</h1>
    <a href="/" class="button">Home</a>

    <h2>Select Your Course</h2>

    <div class="courseList">
      {% for course in courses %}
      <a href="playerSelect.html" class="button">{{ course.name }}</a>
      {% else %}
      <p>No courses found yet. Add some to the database.</p>
      {% endfor %}
    </div>
  </body>

  <style>
    .button {
      display: inline-block;
      padding: 12px 24px;
      background-color: #5c51a0;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1.5rem;
      margin: 8px;
    }

    .courseList {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
  </style>
</html>
